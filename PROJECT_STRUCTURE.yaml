    tools: directory... # Воспроизводимые инструменты приёма и сборки авторского содержимого игры без ручного редактирования производных манифестов.
    ui: directory... # Generated channel-specific UI manifests for «Карты, деньги, поезда».
  cards-money-trains-mock: # Отдельный запускаемый тестовый пакет игры «Карты, деньги, поезда». Он содержит только вымышленные данные и не заменяет нормативный пакет cards-money-trains.
    annotations: directory... # Шаблоны и проверяемые игровые аннотации для переноса транспортной сети с изображения в декларативные данные манифеста; общий контракт хранится в docs/architecture/schemas.
    assets: directory... # Реестр ресурсов mock-пакета: для запуска используется локальная копия разрешённой авторской карты, а тестовая топология и содержимое остаются явно ненормативными.
    authoring: directory... # Собираемые исходники исполнимых game/UI-манифестов тестовой копии; все содержимое явно помечено MOCK.
    fixtures: # Вымышленные команды, грузы, выплаты и контрольный сценарий, используемые только для продолжения разработки до ответа автора.
      complete-session-transcript.json: file # Статичный 88-шаговый mock-транскрипт полного фасилитируемого сеанса с двумя контрольными перезапусками и семью атомарными отказами.
      control-transcript.json: file # Короткий контрольный сценарий базового игрового цикла, сохранённый отдельно от полной партии.
      mock-gameplay-data.json: file # Вымышленные команды, колоды, техника, цены и методические точки test-only игры.
    generated: directory... # Проверенные производные данные карты; пересобираются из JSON-аннотации и не редактируются вручную.
    plugins: directory... # Локальные доверенные плагины отдельного mock-пакета игры «Карты, деньги, поезда».
    tests: directory... # Узкие проверки целостности mock-пакета, преобразования карты и отделения тестовых данных от нормативной игры.
    tools: directory... # Локальные инструменты тестового пакета: проверка аннотаций карты, преобразование в фрагмент манифеста и сборка запускаемой mock-копии.
    ui: directory... # Собранные UI-манифесты тестового игрового пакета.
  estate-race: # Оригинальная пошаговая экономическая игра Estate Race и её изолированные игровые манифесты, интерфейс и подключаемый модуль поля. Первый срез доказывает бросок костей, владение участком и выплату ренты без заимствования названий или оформления Monopoly.
    authoring: directory... # Редактируемые исходные манифесты Estate Race, из которых компилятор создаёт runtime- и web-манифесты вместе с картами источников.
    plugins: directory... # Подключаемые клиентские модули Estate Race; игровое состояние и правила остаются в манифесте и Runtime API.
    published: directory... # Неизменяемый собранный клиентский модуль Estate Race и реестр его адресуемой по содержимому версии.
    tests: directory... # Сквозные runtime-проверки первого игрового среза Estate Race с воспроизводимым зерном случайности.
    ui: directory... # Скомпилированные клиентские манифесты Estate Race, сгруппированные по каналам.
  simple-choice: # Minimal game-agnostic fixture used to prove that runtime-api and player-web can run a second game without a custom web plugin.
    assets: directory... # Исходные (SSOT) ассеты игры simple-choice для канала ADR-063/ADR-091: реестр assets.json, изображения и game-owned таблицы стилей.
    authoring: # Editable ADR-030 authoring manifests for the simple-choice pilot. Runtime manifests are generated from these files and should not be edited directly.
      game.authoring.json: file # Authoring source for the generated simple-choice game manifest.
    published: directory... # Неизменяемые, адресуемые по содержимому генераты игры simple-choice: game-owned таблицы стилей (ADR-091) и их реестр game-stylesheets.json. Правятся только конвейером публикации.
    ui: directory... # Generated channel-specific UI manifests for the simple-choice fixture (compiled from authoring/ui, do not edit by hand).
packages: # Переиспользуемые платформенные пакеты (contracts) 
  contracts: # Слой общих контрактов между сервисами 
    ai: directory... # AI task, result, Cubica Surface, Agent Turn, execution-mode and Agent UI boundary contracts owned by Cubica rather than CopilotKit or AG-UI.
    manifest: directory... # Manifest and content contracts for Cubica.
    runtime: directory... # Runtime execution contracts for Cubica.
    session: directory... # Session lifecycle and player API contracts for Cubica.
  editor-engine: directory... # Framework-agnostic editor engine package for ADR-034 authoring manifest editing. It owns JSON document state, neutral graph projection, reverse projection intents, and deterministic diagnostics helpers.
  view-protocol: directory... # Framework-agnostic package with the Abstract View Protocol contracts (ADR-002: Presenter -> View commands) and JSON state patch utilities (RFC 7396 Merge Patch, RFC 6902 JSON Patch). Seed of the future extracted player core per ADR-064.
scripts: # Скрипты разработки и индексирования 
  ci: # Cross-platform CI validation scripts that enforce repository governance rules before merge.
    validate-agent-ui-boundaries.js: file # Node.js validator for ADR-044 Agent UI import boundaries: CopilotKit and AG-UI imports are allowed only in approved adapter files.
    validate-legacy.js: file # Node.js validator for legacy debt rows, stub register consistency, stub marker governance and .desc.json parsing.
    validate-legacy.ps1: file # PowerShell wrapper that delegates legacy/stub validation to the cross-platform Node.js validator.
    validate-manifest-authoring.js: file # Node.js validator for ADR-030 authoring manifest compilation, generated drift and authoring-only key leakage.
    validate-prototype-audit-status.js: file # Node.js validator for ADR-050 prototype audit status records emitted by the weekly audit workflow.
    validate-runtime-api-openapi.js: file # Node.js validator for ADR-051 runtime-api OpenAPI contract shape, endpoint drift and future extraction spec classification.
  debug: directory... # Поддерживаемые debug-скрипты для локальной проверки UI, журналов и визуального сравнения. Скрипты не являются частью canonical verification и используются вручную при расследовании регрессий.
  manifest-tools: # Manifest transformation and generation tools used by development and CI workflows.
    audit-prototype-candidates.cjs: file # Read-only ADR-050 prototype candidate audit CLI for local, PR, weekly, LLM-semantic and platform promotion backlog workflows.
    compile-authoring-manifests.cjs: file # Compiler for ADR-030 authoring manifests that generates runtime manifests and source map companion files.
    compile-cache.cjs: file # Level-3 compile cache (ADR-057) and hit/miss telemetry: content-hash-keyed, atomic, one-shot .tmp storage that is never a source of truth.
    compile-worker.cjs: file # Worker-thread entry point that compiles one authoring job as a pure function so the compile pool stays byte-identical to a sequential run.
  map-annotation: # Общий schema-first конвейер ручной разметки транспортной сети поверх карты: проверка связей и геометрии, безопасное SVG-наложение и адаптируемая сборка фрагмента манифеста.
    fixtures: directory... # Нейтральные данные и минимальная карта для проверки общего конвейера аннотации без терминов и правил конкретной игры.
    map-annotation.mjs: file # Нейтральный модуль проверки аннотации, визуального наложения и преобразования подтверждённых данных с переданными игрой правилами.
    map-annotation.test.mjs: file # Сфокусированные нейтральные тесты общего формата, review-draft режима и запрета публикации неподтверждённых данных.
  ops: # Operational (ops) scripts for running the platform on a single host until the orchestrator model (LEGACY-0026) is built.
    service-supervisor.mjs: file # Minimal single-host service supervisor (ADR-067): starts, health-checks and restarts the delivery services (runtime-api + player-web) with backoff and graceful group shutdown, as the interim recovery loop. Runbook: docs/processes/service-recovery-runbook.md.
services: # Сервисы и инфраструктура 
  game-editor: # Service boundary for the future Cubica game editor. It contains authoring workspace documentation and will host editor-specific implementation when this boundary is activated.
    docs: # Project documentation for Game Editor features, authoring workflows and editor-engine design.
      editor-engine-authoring-manifest-editor.md: file # Design document for the schema-first authoring manifest editor with flow-chart projection, Monaco/JSON editing and floating property panel.
    DEV_GUIDE.md: file # Development guide for the Game Editor service boundary, including current scope, planned editor-engine direction and testing expectations.
  game-engine: directory... # Service boundary for a future game engine service. The current canonical runtime path executes deterministic manifest actions in services/runtime-api.
