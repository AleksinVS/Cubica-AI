<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал ходов - Antarctica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Reference Image Overlay for Pixel-Perfect Matching -->
        <img src="../moves-journal.jpg" id="reference-overlay" style="position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; z-index: 1000; opacity: 0.5; pointer-events: none; display: none;">

        <div class="ui-layer">
            <header>
                <h1>Журнал ходов</h1>
            </header>

            <main id="moves-journal" class="scrollable-content">
                <!-- Moves will be injected here by script.js -->
            </main>

            <footer>
                <div class="footer-left">
                    <button class="btn btn-primary" id="btn-journal">
                        <img src="btn-journal-bg.png" class="btn-bg">
                        <span class="btn-text">журнал ходов</span>
                    </button>
                    <button class="btn btn-secondary" id="btn-hint">
                        <img src="btn-hint-bg.png" class="btn-bg">
                        <span class="btn-text">подсказка</span>
                    </button>
                </div>
                <div class="footer-right">
                    <!-- Nav buttons -->
                    <button class="btn btn-nav" id="btn-prev">
                        <img src="btn-left-bg.png" class="btn-bg">
                        <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <button class="btn btn-nav" id="btn-next">
                        <img src="btn-right-bg.png" class="btn-bg">
                        <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Toggle reference image with 'R' key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                const overlay = document.getElementById('reference-overlay');
                overlay.style.display = overlay.style.display === 'none' ? 'block' : 'none';
            }
        });
    </script>
</body>
</html>
