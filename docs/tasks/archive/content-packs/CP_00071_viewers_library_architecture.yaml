## Decision Log

- Decision: viewers размещаются в `SDK/viewers/` как SDK‑пакеты, а игры в `games/*` содержат только контент и манифесты.
  Rationale: viewers переиспользуются между играми и логически ближе к SDK, чем к игровому контенту.
  Date/Author: 2025-12-19 / Agent.

- Decision: выбор viewer задаётся в game manifest через поле `meta.viewer`, с проверкой совместимости по метаданным viewer.
  Rationale: game manifest остаётся источником требований игры, а проверка совместимости становится формализованной.
  Date/Author: 2025-12-19 / Agent.

- Decision: клиентские скрипты разрешены только после проверки платформой; они получают доступ к DOM (Document Object Model — дерево элементов веб‑страницы) и не изолируются через iframe, оценка рисков отложена.
  Rationale: требуется поддержка клиентских расширений уже сейчас, при этом контроль переносится в процедуру проверки и подписи.
  Date/Author: 2025-12-19 / Agent.

