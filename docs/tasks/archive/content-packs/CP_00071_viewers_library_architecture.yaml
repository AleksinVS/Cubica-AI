## Context and Orientation

Viewer — это клиентский модуль, который читает UI‑манифест (JSON‑описание игры) и отображает его пользователю. Game manifest — JSON‑описание логики и метаданных игры. SDK (Software Development Kit — набор библиотек и утилит) содержит общий код для клиентов. ADR (Architecture Decision Record — документ с зафиксированным архитектурным решением) фиксирует ключевые решения. Router — сервис, который принимает действия клиента и маршрутизирует их в движок. Presenter — слой, который связывает Model и View и формирует команды для UI. Sandbox (изолированное окружение выполнения кода с ограничениями) используется на сервере для исполнения скриптов. CSP (Content Security Policy — политика безопасности контента) ограничивает источники и виды выполняемого кода в браузере. DOM (Document Object Model — дерево элементов веб‑страницы) представляет интерфейс страницы. JSON Merge Patch — формат патча, где JSON с полями заменяет соответствующие значения, а `null` означает удаление. JSON Patch — список операций `add/replace/remove` по путям.

В работе участвуют документы и каталоги: `docs/architecture/PROJECT_ARCHITECTURE.md`, `PROJECT_OVERVIEW.md`, `PROJECT_STRUCTURE.md`, `docs/architecture/adrs/`, `docs/architecture/schemas/`, `SDK/`, `games/`, `docs/tasks/features/F_00071_viewers_library_architecture_(E_0010).md` и `docs/tasks/ROADMAP.md`.

