## Purpose / Big Picture

Viewer (клиентский модуль, который читает UI‑манифест и отображает его пользователю) должен быть переиспользуемым и предсказуемым. После выполнения этого плана команда сможет однозначно определить, где лежат viewers, как игра выбирает нужный viewer, как проверяется совместимость и как безопасно подключать клиентские скрипты через проверку платформы. Результат подтверждается документами и ADR, а также синхронизацией задач в `docs/tasks/`.

