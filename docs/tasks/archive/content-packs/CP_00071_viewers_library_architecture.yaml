## Idempotence and Recovery

Все шаги относятся к документации и безопасны для повторного выполнения. Если правка оказалась некорректной, достаточно вернуть файл в исходное состояние и применить изменения заново. Для контроля использовать пофайловые изменения и проверку ссылок.

## Artifacts and Notes

Пример указания viewer в game manifest:

    "meta": {
      "viewer": {
        "id": "web-default",
        "version": "1.0.0",
        "channel": "web"
      }
    }

Пример метаданных viewer (`viewer.json`):

    {
      "id": "web-default",
      "version": "1.0.0",
      "supported_ui_schema_versions": ["1.0"],
      "supported_game_schema_versions": ["1.0"],
      "channels": ["web"],
      "required_capabilities": ["actions.command_payload", "state.merge_patch"]
    }

Пример метаданных клиентского скрипта (пакет после проверки платформой):

    {
      "id": "client-graph-viz",
      "version": "1.0.0",
      "entry": "dist/index.js",
      "sha256": "<hash>",
      "capabilities": ["dom_access"],
      "viewer_compat": ["web-default@^1.0.0"],
      "review_status": "approved",
      "signature": "<signature>"
    }

## Interfaces and Dependencies

Viewer принимает UI‑манифест, game manifest и патчи состояния. Минимальный контракт действий — `command/payload` между Presenter и View. Базовый формат патчей состояния — JSON Merge Patch, с возможной поддержкой JSON Patch как расширения. Совместимость viewer определяется по метаданным `viewer.json` и полям `schema_version`/`min_engine_version` в game manifest. Клиентские скрипты загружаются только после проверки платформой и проверки подписи, доступны в реестре скриптов и исполняются с доступом к DOM без iframe. Ограничения по источникам кода и сетевым доступам должны быть описаны через CSP.
