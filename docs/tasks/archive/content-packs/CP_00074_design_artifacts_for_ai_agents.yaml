   - Граф связей между артефактами

3. **Обновить `ui-manifest.schema.json`**:
   - Добавить секцию `design_artifacts` с полями `history`, `base_path`, `registry`
   - Добавить поле `design_artifact_id` в screens и uiComponent

4. **Обновить документацию**:
   - `manifest-structure.md` — раздел про дизайн-артефакты
   - `PROJECT_ARCHITECTURE.md` — ссылка на ADR-016

5. **Создать примеры**:
