## Surprises & Discoveries

- Observation: Схема `regions` оказалась достаточно гибкой для описания сложных иерархий UI-элементов
  Evidence: Рекурсивная структура `elements` внутри `region` позволяет описывать вложенные компоненты

- Observation: Паттерн `source_ref` из ADR-013 отлично подходит для ссылок на дизайн-артефакты
  Evidence: Структура `designArtifactRef` использует тот же подход с полем `file`

## Decision Log

- Decision: Схемы проектируются максимально гибкими с использованием `additionalProperties: true` для основных секций
  Rationale: Точное содержание артефактов пока не известно, схема должна позволять расширения без нарушения валидации
  Date/Author: 2026-01-17, AI Agent

- Decision: Секция `regions` использует рекурсивную структуру для вложенных элементов
  Rationale: Позволяет описывать сложные иерархии UI-элементов на изображении
  Date/Author: 2026-01-17, AI Agent

- Decision: Добавлены два дополнительных типа связей: `references` и `extends`
  Rationale: Расширяют возможности графа связей для более сложных сценариев
  Date/Author: 2026-01-17, AI Agent

- Decision: Секция `layouts` в ui-manifest помечена как DEPRECATED
  Rationale: Новые проекты должны использовать `design_artifacts`, но старые манифесты остаются совместимыми
  Date/Author: 2026-01-17, AI Agent

## Outcomes & Retrospective

### Что было сделано

1. **Создана гибкая JSON Schema для дизайн-артефактов** (`design-artifact.schema.json`)
   - 7 типов артефактов: reference, concept, flowchart, wireframe, storyboard, mockup, asset
   - Секции: image, generation, regions, style_tokens, meta
   - Рекурсивная структура для вложенных элементов в regions

2. **Создана JSON Schema для истории версий** (`design-history.schema.json`)
   - Реестр артефактов с историей версий
   - Граф связей с 8 типами: inspires, structures, animates, refines, extracts, replaces, references, extends

3. **Обновлён UI-манифест**
   - Добавлена секция `design_artifacts` с registry и source_ref
   - Добавлено поле `design_artifact_id` в screens и uiComponent
   - Секция `layouts` помечена как DEPRECATED

4. **Создана документация**
   - Раздел "Design Artifacts" в manifest-structure.md
   - Описание ADR-016 в PROJECT_ARCHITECTURE.md
   - Три примера: concept, mockup, history

5. **Подготовлена структура для Antarctica**
   - Создан каталог design/ с подкаталогами
   - Создан пустой design-history.json

### Уроки

- Гибкие схемы с `additionalProperties: true` позволяют расширять формат без breaking changes
- Рекурсивные структуры в JSON Schema требуют аккуратного использования `$ref`
- Паттерн `source_ref` хорошо масштабируется на разные типы внешних ресурсов

### Что осталось (out of scope)

- CLI для валидации описаний
- Инструменты автоматической разметки (CV-модели)
- Миграция существующих layouts
- Интеграция с Game Editor

## Context and Orientation

Проект Cubica использует JSON-манифесты для описания игр. Согласно ADR-013, манифесты разделены на логические (game-manifest) и UI-манифесты (ui-manifest).

ADR-016 определяет архитектуру хранения дизайн-артефактов:
- 7 типов артефактов: reference, concept, flowchart, wireframe, storyboard, mockup, asset
- Паттерн `source_ref` для ссылок на внешние файлы
- Структура каталогов `design/` рядом с манифестом
- Файлы `*.design.json` с описаниями артефактов

Ключевые файлы:
- `docs/architecture/schemas/ui-manifest.schema.json` — текущая схема UI-манифеста
- `docs/architecture/schemas/manifest-structure.md` — документация структуры манифестов
- `docs/architecture/adrs/016-design-artifacts-in-ui-manifest.md` — ADR с решением

## Plan of Work

1. **Создать `design-artifact.schema.json`** — гибкая схема для описания артефакта:
   - Обязательные поля: `id`, `type`, `name`
   - Опциональные секции: `image`, `generation`, `regions`, `style_tokens`, `meta`
   - Все секции допускают дополнительные свойства для расширяемости

2. **Создать `design-history.schema.json`** — схема истории версий:
