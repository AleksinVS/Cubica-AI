  ### Milestone 3: ADR-006 (View Adapters)

  Расширить файл `docs/architecture/adrs/006-view-adapters-deployment.md`:

  ```markdown
  ## Consequences

  ### Positive
  - Единый код Engine работает с любым viewer
  - Простое добавление новых платформ
  - Изоляция платформо-специфичного кода

  ### Negative
  - Дополнительный слой абстракции
  - Возможные потери производительности при трансляции

  ### Risks
  - Риск: Несовместимость API между адаптерами
  - Mitigation: Строгая типизация, contract testing

  ## Implementation Plan

  1. Определить интерфейс ViewAdapter в SDK/core
  2. Реализовать WebViewAdapter для браузеров
  3. Реализовать TelegramViewAdapter для Telegram Mini Apps
  4. Создать тесты совместимости адаптеров
  5. Документировать процесс создания новых адаптеров

  ## Related Artifacts

  - Features: F_00032
  - Code: SDK/react-sdk/src/adapters/
  - ADR: ADR-002 (Abstract View Protocol)
  ```

