  ## Plan of Work

  ### Milestone 1: ADR-002 (Abstract View Protocol)

  Добавить в файл `docs/architecture/adrs/002-abstract-view-protocol.md`:

  ```markdown
  ## Alternatives Considered

  ### 1. Direct DOM Manipulation
  - **Description:** Viewer напрямую манипулирует DOM
  - **Rejected because:** Нет абстракции, жесткая связь с платформой

  ### 2. GraphQL-based Protocol
  - **Description:** Использовать GraphQL для описания UI
  - **Rejected because:** Overhead для простых сценариев, сложность

  ### 3. Abstract View Protocol (Chosen)
  - **Description:** Унифицированный протокол команд/событий
  - **Chosen because:** Простота, расширяемость, платформонезависимость

  ## Implementation Plan

  1. Определить базовые типы протокола в SDK/core
  2. Реализовать адаптеры для Web, Telegram
  3. Интегрировать с Router для маршрутизации событий
  4. Документировать API для разработчиков viewers

  ## Related Artifacts

  - Features: F_00012
  - Code: SDK/core/src/types/protocol.ts
  - ADR: ADR-006 (View Adapters)
  ```

