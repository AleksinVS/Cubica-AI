  ## Purpose / Big Picture

  После выполнения плана:

  1. Команды `npm run dev` и `npm run build` в плеере будут автоматически синхронизировать манифесты из `games/antarctica/`
  2. Источник истины (Single Source of Truth) будет соблюден: `games/antarctica/` — канонический источник
  3. Дублирование данных (секция `application`) будет удалено из плеера
  4. Изменения в манифестах игры автоматически отразятся в плеере при сборке

  ## Progress

  - [ ] Создать скрипт синхронизации
  - [ ] Интегрировать в package.json
  - [ ] Удалить секцию `application` из манифеста плеера
  - [ ] Проверить работу плеера

