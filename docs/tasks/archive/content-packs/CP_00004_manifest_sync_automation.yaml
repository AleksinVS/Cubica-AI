  # ExecPlan: Manifest Sync Automation

  Этот ExecPlan — живой документ. Он должен поддерживаться в соответствии с `docs/tasks/content-packs/PLAN.md`.

  ## Оглавление

  - [Purpose / Big Picture](#purpose--big-picture)
  - [Progress](#progress)
  - [Context and Orientation](#context-and-orientation)
  - [Plan of Work](#plan-of-work)
