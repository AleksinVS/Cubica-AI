## Interfaces and Dependencies

В рамках этого ExecPlan никаких внешних зависимостей (библиотек) добавлять не планируется. Все изменения ограничиваются:

- уточнением архитектурных документов;
- добавлением описаний задач;
- созданием базовых модулей с типами и интерфейсами внутри `services/router`.
