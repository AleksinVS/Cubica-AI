## Surprises & Discoveries

- Observation: На момент начала работы сервис Router не имеет реализованного кода (только заготовка каталога).
  Evidence: Каталог `services/router/src` содержит только `.gitkeep`, тесты также не созданы.

## Decision Log

- Decision: Реализация в коде будет ограничена описанием интерфейсов и базовой структуры данных для очереди событий без полноценной интеграции с БД и LLM.
  Rationale: В репозитории отсутствует существующий код Router и инфраструктура запуска; цель текущей итерации — согласовать архитектуру и подготовить основу для последующей реализации.
  Date/Author: 2025-12-01, AI Agent.

## Outcomes & Retrospective
Этот раздел будет обновлён после полного завершения плана. На текущем этапе:

- ADR-011 переписан на русском языке и дополнен описанием версий состояния, расширенной схемой `session_events` и правил обработки событий.
- Добавлена отдельная фича F_00063 для дальнейшего развития мультиплеера и очереди событий.
- В Router создан модуль с интерфейсами и типами для очереди событий и состояния сессий, а также простые тесты-примеры для будущей логики.

## Context and Orientation

Платформа Cubica описана в корневых документах:

- `PROJECT_OVERVIEW.md` — общий обзор проекта и бизнес-контекст.
- `PROJECT_STRUCTURE.md` — фактическая структура репозитория.
- `docs/architecture/PROJECT_ARCHITECTURE.md` — архитектура платформы и связь с ADR.
- `docs/architecture/adrs/011-multiplayer-architecture.md` — текущее решение по мультиплееру (free-form модель с очередью событий).

Фича мультиплеера описана в:

- `docs/tasks/features/F_00060_multiplayer_architecture.md` — фича верхнего уровня, к которой привязан этот ExecPlan.

Текущая реализация Router:

- `services/router/` — каркас сервиса маршрутизатора, сейчас без реального кода.
  - `services/router/src/` — исходники, пока пусто.
  - `services/router/tests/` — тесты, пока пусто.
  - `services/router/DEV_GUIDE.md` — локальная документация по сервису (если потребуется расширение).

В этой итерации мы не будем реализовывать полноценный сервис Router, а сосредоточимся на:

1. Уточнении ADR-011: добавлении явной версионности состояния, правил обработки зависших/ошибочных событий и политики хранения событий.
2. Добавлении отдельной фичи для «укрепления» мультиплеера и очереди событий (чтобы отделить архитектурный рефакторинг от изначальной фичи F_00060).
3. Добавлении базовых структур данных и интерфейсов для работы с очередью событий, которые вписываются в архитектуру и могут быть развиты в последующих ExecPlan.

## Plan of Work

1. Обновить ADR-011 (`docs/architecture/adrs/011-multiplayer-architecture.md`):
   - Добавить раздел про версионность состояния сессии: поле версии в `game_sessions`, связь с последним обработанным событием.
   - Добавить расширенную схему таблицы `session_events` с номером последовательности события в рамках сессии.
   - Описать правила обработки зависших событий (`processing` слишком долго), повторных попыток и окончательного перевода в состояние ошибки.
   - Уточнить формат сообщений, отправляемых клиентам (включая номер версии состояния/последнего события).
   - Описать минимальные требования к LLM-контексту для многопользовательских сессий (разделение общего и приватного контекстов).
2. Добавить новую фичу:
   - Создать файл `docs/tasks/features/F_00063_multiplayer_queue_hardening.md` (номер подобран как свободный рядом с F_00062).
   - Описать в нём цели «укрепления» мультиплеерной очереди: версионность, обработка ошибок, подготовка к масштабированию.
   - В `docs/tasks/ROADMAP.md` добавить ссылку на новую фичу под эпиком E_0030.
3. Обновить ExecPlan (этот файл) в соответствии с фактическими шагами:
   - Отметить выполненные пункты в разделе `Progress`.
   - Зафиксировать принятые решения в `Decision Log`.
4. Подготовить базовый каркас реализации:
   - В каталоге `services/router/src/` создать модуль (например, `sessionEvents.ts` или аналогичный в принятом в проекте языке), описывающий:
     - типы данных для событий сессии (session event) и состояния сессии;
     - интерфейсы для работы с очередью (запись события, выборка следующего события для обработки, обновление статуса).
   - В `services/router/tests/` добавить заглушечные тесты, которые хотя бы проверяют корректность базовых типов и интерфейсов (без подключения к реальной БД).
5. Обновить документацию:
   - При необходимости скорректировать `docs/architecture/PROJECT_ARCHITECTURE.md`, чтобы там упоминалась обновлённая модель мультиплеера (версионность состояния, очередь событий).
   - Убедиться, что `PROJECT_STRUCTURE.md` не требует обновлений (мы не добавляем новые каталоги, только файлы в существующей структуре).

## Concrete Steps

Все команды выполняются из корня репозитория `Cubica/`.

1. Обновление ADR-011:
   - Открыть файл `docs/architecture/adrs/011-multiplayer-architecture.md`.
   - Добавить новые подразделы (на русском языке) в секцию решения:
     - раздел про версионность состояния (`state_version`, `last_event_id/sequence`),
     - раздел про управление жизненным циклом событий (ретенция, зависшие, повторные попытки),
     - раздел про формат обновлений для клиентов (номер версии и последний обработанный event),
     - раздел про LLM-контекст для мультиплеера.
2. Добавление фичи:
   - Создать файл `docs/tasks/features/F_00063_multiplayer_queue_hardening.md` по шаблону `_TEMPLATE_FEATURE.md`.
   - В `docs/tasks/ROADMAP.md` под эпиком `Game Engine & Backend Architecture Design (E_0030)` добавить новую строку для фичи F_00063 с кратким описанием.
3. Каркас реализации:
   - Определить используемый язык и стек для Router (по умолчанию предположить TypeScript/Node.js; если в репозитории обнаружится иной стандарт для сервисов, подстроиться под него).
   - Создать базовый модуль с типами и интерфейсами работы с очередью, не привязываясь к конкретной БД.
   - Создать тесты-заглушки, которые подтверждают, что модуль можно импортировать, и структуры данных соответствуют ожиданиям (без реальных проверок БД).
4. Обновление документации:
   - При необходимости скорректировать `docs/architecture/PROJECT_ARCHITECTURE.md`, чтобы ссылка на ADR-011 отражала новые детали.
   - Проверить, что ROADMAP и новая фича согласованы друг с другом.

## Validation and Acceptance

Работа по этому ExecPlan считается принятой, если выполняются условия:

1. ADR-011 обновлён и описывает:
   - явное версионирование состояния сессии,
   - правила работы с очередью событий (включая зависшие и ошибочные события),
   - формат обновлений для клиентов с указанием версии/последнего события,
   - требования к LLM-контексту в мультиплеере.
2. Создана и описана фича `F_00063-multiplayer-queue-hardening` с чек-листом задач и критериев приёмки.
3. В `docs/tasks/ROADMAP.md` добавлена ссылка на новую фичу под эпиком E_0030.
4. В `services/router/src/` и `services/router/tests/` добавлены базовые файлы с типами и интерфейсами для работы с очередью событий, тесты проходят (минимум — импорт и базовые проверки типов).
5. Документация (`docs/architecture/PROJECT_ARCHITECTURE.md`) согласована с обновлённым ADR-011.

## Idempotence and Recovery

Шаги этого плана можно повторять безопасно, так как:

- Изменения в ADR-011 и документации являются чистыми правками текста.
- Новые файлы фичи и ExecPlan заранее предусмотрены и не конфликтуют с существующими идентификаторами.
- Каркас модулей Router может быть перезаписан при необходимости; до внедрения в реальный runtime он не влияет на работу других частей системы.

В случае ошибки при редактировании Markdown-файлов рекомендуется использовать дифф (например, через `git diff`) и ручной откат отдельных изменений.

