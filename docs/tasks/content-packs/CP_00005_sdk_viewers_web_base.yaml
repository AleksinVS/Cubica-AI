  ### Milestone 5: Создание README.md

  Файл `SDK/viewers/web-base/README.md`:

  ```markdown
  # @cubica/viewer-web-base

  Базовый веб-viewer для игр Cubica.

  ## Описание

  Этот пакет предоставляет базовые типы, интерфейсы и компоненты для создания
  веб-плееров игр Cubica. Он реализует архитектуру, описанную в ADR-014.

  ## Установка

  ```bash
  npm install @cubica/viewer-web-base
  ```

  ## Использование

  ```typescript
  import { ViewerConfig, ViewerState, GameAction } from '@cubica/viewer-web-base';

  const config: ViewerConfig = {
    gameManifestUrl: '/api/game/antarctica/manifest',
    uiManifestUrl: '/api/game/antarctica/ui',
    onAction: async (action: GameAction) => {
      // Handle action
    }
  };
  ```

  ## Возможности (Capabilities)

  - **ui-rendering** — рендеринг UI-компонентов из манифеста
  - **state-management** — управление состоянием игры
  - **action-routing** — маршрутизация действий к Router/Engine
  - **binding-resolution** — разрешение биндингов `{{state.public.x}}`

  ## Структура

  ```
  web-base/
  ├── src/
  │   ├── index.ts      # Экспорты пакета
  │   ├── types.ts      # TypeScript типы
  │   └── components/   # React компоненты (в разработке)
  ├── package.json
  └── viewer.json       # Метаданные viewer
  ```

  ## Ссылки

