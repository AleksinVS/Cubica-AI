  ### Milestone 4: Создание базовых типов

  Файл `SDK/viewers/web-base/src/types.ts`:

  ```typescript
  /**
   * Types for Cubica Web Base Viewer
   *
   * Эти типы определяют интерфейсы для компонентов viewer.
   */

  /** Метаданные viewer из viewer.json */
  export interface ViewerMetadata {
    id: string;
    version: string;
    name: string;
    description: string;
    channel: 'web' | 'telegram' | 'mobile';
    supported_schemas: string[];
    capabilities: ViewerCapability[];
  }

  /** Возможности viewer */
  export type ViewerCapability =
    | 'ui-rendering'
    | 'state-management'
    | 'action-routing'
    | 'binding-resolution';

  /** Конфигурация viewer */
  export interface ViewerConfig {
    gameManifestUrl: string;
    uiManifestUrl: string;
    routerUrl?: string;
    onAction?: (action: GameAction) => Promise<void>;
  }

  /** Игровое действие */
  export interface GameAction {
    command: string;
    payload?: Record<string, unknown>;
  }

  /** Состояние viewer */
  export interface ViewerState {
    loading: boolean;
    error: string | null;
    currentScreen: string | null;
    gameState: Record<string, unknown>;
  }
  ```

