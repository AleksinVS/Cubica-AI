  ## Context and Orientation

  **Текущее состояние:**

  - Директория `SDK/viewers/` не существует
  - Viewer реализован как монолитное приложение в `games/antarctica-nextjs-player/`
  - Компоненты жестко связаны с контентом игры Antarctica
  - ADR-014 описывает целевую архитектуру Viewers Library, но она не реализована

  **Целевая структура по ADR-014:**

  ```
  SDK/viewers/
  ├── web-base/           # Базовый веб-плеер
  │   ├── package.json
  │   ├── viewer.json     # Метаданные viewer
  │   ├── src/
  │   │   ├── index.ts
  │   │   ├── types.ts
  │   │   └── components/
  │   └── README.md
  ├── telegram-base/      # (будущее) Telegram-плеер
  └── mobile-base/        # (будущее) Мобильный плеер
  ```

  **Ключевые концепции из ADR-014:**

  - **Viewer** — клиентское приложение для рендеринга игр
  - **Channel** — платформа доставки (web, telegram, mobile)
  - **viewer.json** — метаданные о возможностях viewer
  - **Capabilities** — набор функций viewer (ui-rendering, state-management, action-routing)

