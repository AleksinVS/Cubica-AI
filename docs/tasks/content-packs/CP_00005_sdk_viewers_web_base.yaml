  # ExecPlan: SDK Viewers Web Base

  Этот ExecPlan — живой документ. Он должен поддерживаться в соответствии с `docs/tasks/content-packs/PLAN.md`.

  ## Оглавление

  - [Purpose / Big Picture](#purpose--big-picture)
  - [Progress](#progress)
  - [Context and Orientation](#context-and-orientation)
  - [Plan of Work](#plan-of-work)
  - [Concrete Steps](#concrete-steps)
  - [Validation and Acceptance](#validation-and-acceptance)

  ## Purpose / Big Picture

  После выполнения плана:

  1. Директория `SDK/viewers/web-base/` будет содержать базовую структуру веб-viewer
  2. `package.json` определит пакет `@cubica/viewer-web-base`
  3. `viewer.json` содержит метаданные viewer по ADR-014
  4. Базовые типы и интерфейсы экспортированы для переиспользования
  5. Документация объясняет использование viewer

  Это создаст фундамент для переиспользуемой библиотеки плееров игр.

