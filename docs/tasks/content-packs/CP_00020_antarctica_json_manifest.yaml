  # ExecPlan: Antarctica JSON-манифест для Next.js-плеера

  Этот ExecPlan — живой документ и должен поддерживаться в полном соответствии с `docs/tasks/content-packs/PLAN.md` на каждом шаге реализации.

  ## Оглавление

  - [Purpose / Big Picture](#purpose--big-picture)
  - [Progress](#progress)
  - [Surprises & Discoveries](#surprises--discoveries)
