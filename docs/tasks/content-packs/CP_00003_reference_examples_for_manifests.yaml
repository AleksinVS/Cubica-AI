  ## Purpose / Big Picture

  После выполнения плана разработчики получат 4 референсных примера манифестов:

  1. **split-manifest/** — демонстрация разделения логического и UI-манифестов по ADR-013
  2. **hybrid-execution/** — демонстрация script handlers по ADR-007
  3. **multiplayer-game/** — демонстрация многопользовательской игры по ADR-011
  4. **extension-usage/** — демонстрация использования Extension Packs по ADR-015

  Каждый пример будет содержать README.md с подробным объяснением структуры.

